<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EmotionRing</title>
  
  <!-- Tailwind CSS (デザイン用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (アイコン用) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザでReactを動かすため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // FontAwesomeのクラス名に置き換えた感情データ
    const EMOTION_CATEGORIES = [
      { category: 'joy', levels: [ {id:'ecstasy', name:'恍惚', icon: 'fas fa-sun', base:'bg-yellow-400', text:'text-yellow-950'}, {id:'joy', name:'喜び', icon: 'fas fa-smile', base:'bg-yellow-300', text:'text-yellow-900'}, {id:'serenity', name:'平穏', icon: 'fas fa-star', base:'bg-yellow-100', text:'text-yellow-800'} ]},
      { category: 'trust', levels: [ {id:'admiration', name:'敬愛', icon: 'fas fa-heart', base:'bg-lime-400', text:'text-lime-950'}, {id:'trust', name:'信頼', icon: 'fas fa-shield-alt', base:'bg-lime-300', text:'text-lime-900'}, {id:'acceptance', name:'容認', icon: 'fas fa-check-circle', base:'bg-lime-100', text:'text-lime-800'} ]},
      { category: 'fear', levels: [ {id:'terror', name:'恐怖', icon: 'fas fa-exclamation-triangle', base:'bg-teal-400', text:'text-teal-950'}, {id:'fear', name:'恐れ', icon: 'fas fa-frown', base:'bg-teal-300', text:'text-teal-900'}, {id:'apprehension', name:'不安', icon: 'fas fa-exclamation-circle', base:'bg-teal-100', text:'text-teal-800'} ]},
      { category: 'surprise', levels: [ {id:'amazement', name:'驚愕', icon: 'fas fa-bolt', base:'bg-cyan-400', text:'text-cyan-950'}, {id:'surprise', name:'驚き', icon: 'fas fa-eye', base:'bg-cyan-300', text:'text-cyan-900'}, {id:'distraction', name:'動揺', icon: 'fas fa-question-circle', base:'bg-cyan-100', text:'text-cyan-800'} ]},
      { category: 'sadness', levels: [ {id:'grief', name:'悲観', icon: 'fas fa-cloud-showers-heavy', base:'bg-blue-400', text:'text-blue-950'}, {id:'sadness', name:'悲しみ', icon: 'fas fa-cloud', base:'bg-blue-300', text:'text-blue-900'}, {id:'pensiveness', name:'哀愁', icon: 'fas fa-umbrella', base:'bg-blue-100', text:'text-blue-800'} ]},
      { category: 'disgust', levels: [ {id:'loathing', name:'憎悪', icon: 'fas fa-times-circle', base:'bg-purple-400', text:'text-purple-950'}, {id:'disgust', name:'嫌悪', icon: 'fas fa-meh', base:'bg-purple-300', text:'text-purple-900'}, {id:'boredom', name:'退屈', icon: 'fas fa-minus-circle', base:'bg-purple-100', text:'text-purple-800'} ]},
      { category: 'anger', levels: [ {id:'rage', name:'激怒', icon: 'fas fa-fire', base:'bg-red-400', text:'text-red-950'}, {id:'anger', name:'怒り', icon: 'fas fa-stop-circle', base:'bg-red-300', text:'text-red-900'}, {id:'annoyance', name:'苛立', icon: 'fas fa-window-close', base:'bg-red-100', text:'text-red-800'} ]},
      { category: 'anticipation', levels: [ {id:'vigilance', name:'警戒', icon: 'fas fa-search', base:'bg-orange-400', text:'text-orange-950'}, {id:'anticipation', name:'期待', icon: 'fas fa-compass', base:'bg-orange-300', text:'text-orange-900'}, {id:'interest', name:'関心', icon: 'fas fa-location-arrow', base:'bg-orange-100', text:'text-orange-800'} ]}
    ];

    const ALL_EMOTIONS = EMOTION_CATEGORIES.flatMap(cat => cat.levels);
    const LOCAL_STORAGE_KEY = 'emotionRingLogsV11';
    const SYNC_STATUS_KEY = 'emotionRingSyncStatusV11';

    function App() {
      const [activeTab, setActiveTab] = useState('input');
      const [selectedEmotions, setSelectedEmotions] = useState(new Set());
      const [comment, setComment] = useState('');
      const [logs, setLogs] = useState([]);
      const [lastExportTime, setLastExportTime] = useState(0);
      const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        const savedLogs = localStorage.getItem(LOCAL_STORAGE_KEY);
        const savedExportTime = localStorage.getItem(SYNC_STATUS_KEY);
        
        if (savedLogs) {
          try {
            const parsedLogs = JSON.parse(savedLogs);
            setLogs(parsedLogs);
            const exportTime = savedExportTime ? parseInt(savedExportTime, 10) : 0;
            setLastExportTime(exportTime);
            if (parsedLogs.length > 0 && parsedLogs[0].timestamp > exportTime) {
              setHasUnsavedChanges(true);
            }
          } catch (e) {
            console.error("Logs parsing error", e);
          }
        }
      }, []);

      const toggleEmotion = (id) => {
        const newSelection = new Set(selectedEmotions);
        if (newSelection.has(id)) {
          newSelection.delete(id);
        } else {
          newSelection.add(id);
        }
        setSelectedEmotions(newSelection);
      };

      const handleSave = () => {
        if (selectedEmotions.size === 0) return;

        const newLog = {
          id: Date.now().toString(),
          timestamp: Date.now(),
          emotions: Array.from(selectedEmotions),
          comment: comment
        };

        const updatedLogs = [newLog, ...logs];
        setLogs(updatedLogs);
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updatedLogs));
        setHasUnsavedChanges(true);

        setSelectedEmotions(new Set());
        setComment('');
        setActiveTab('history');
        window.scrollTo(0, 0);
      };

      const formatDate = (timestamp) => {
        const d = new Date(timestamp);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${mm}/${dd} ${hh}:${min}`;
      };

      const exportCSV = () => {
        if (logs.length === 0) return;

        let csvContent = "ID,日時(タイムスタンプ),感情(カンマ区切り),コメント\n";
        logs.forEach(log => {
          const id = log.id;
          const timestamp = log.timestamp;
          const emotionsStr = log.emotions.join(',');
          const safeComment = `"${(log.comment || '').replace(/"/g, '""')}"`;
          csvContent += `${id},${timestamp},"${emotionsStr}",${safeComment}\n`;
        });

        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `EmotionRing_Data.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        const now = Date.now();
        setLastExportTime(now);
        setHasUnsavedChanges(false);
        localStorage.setItem(SYNC_STATUS_KEY, now.toString());
      };

      const handleImportClick = () => {
        fileInputRef.current.click();
      };

      const processImportFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const csvData = event.target.result;
          parseCSVAndMerge(csvData);
          e.target.value = null; 
        };
        reader.readAsText(file);
      };

      const parseCSVAndMerge = (csvData) => {
        try {
          const rows = [];
          let row = [];
          let currentString = '';
          let insideQuotes = false;
          
          for (let i = 0; i < csvData.length; i++) {
            const char = csvData[i];
            if (insideQuotes) {
              if (char === '"') {
                if (i + 1 < csvData.length && csvData[i + 1] === '"') {
                  currentString += '"'; i++;
                } else { insideQuotes = false; }
              } else { currentString += char; }
            } else {
              if (char === '"') { insideQuotes = true; } 
              else if (char === ',') { row.push(currentString); currentString = ''; } 
              else if (char === '\n' || char === '\r') {
                if (char === '\r' && i + 1 < csvData.length && csvData[i + 1] === '\n') { i++; }
                row.push(currentString); rows.push(row); row = []; currentString = '';
              } else { currentString += char; }
            }
          }
          if (currentString || row.length > 0) { row.push(currentString); rows.push(row); }

          const importedLogs = [];
          for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (r.length >= 4 && r[0]) {
              importedLogs.push({ id: r[0], timestamp: parseInt(r[1], 10), emotions: r[2] ? r[2].split(',') : [], comment: r[3] || '' });
            }
          }

          if (importedLogs.length === 0) return;

          const mergedMap = new Map();
          [...logs, ...importedLogs].forEach(log => mergedMap.set(log.id, log));
          const mergedLogs = Array.from(mergedMap.values()).sort((a, b) => b.timestamp - a.timestamp);
          
          setLogs(mergedLogs);
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(mergedLogs));
          
          const now = Date.now();
          setLastExportTime(now);
          setHasUnsavedChanges(false);
          localStorage.setItem(SYNC_STATUS_KEY, now.toString());
        } catch (error) { console.error("Import Error:", error); }
      };

      const handleClearData = () => {
        setLogs([]);
        localStorage.removeItem(LOCAL_STORAGE_KEY);
        localStorage.removeItem(SYNC_STATUS_KEY);
        setHasUnsavedChanges(false);
        setLastExportTime(0);
      };

      return (
        <div className="min-h-screen pb-20 select-none">
          <header className="bg-white px-4 py-2 shadow-sm sticky top-0 z-30 flex items-center justify-between border-b border-gray-100">
            <h1 className="text-base font-bold text-gray-800 tracking-wider flex items-center mx-auto">
              <i className="fas fa-smile text-blue-500 mr-2 text-xl"></i>
              EmotionRing
            </h1>
            {hasUnsavedChanges && activeTab === 'history' && (
               <div className="absolute right-4 text-red-500 flex items-center animate-pulse">
                 <i className="fas fa-exclamation-circle text-lg"></i>
               </div>
            )}
          </header>

          <main className="max-w-md mx-auto p-2">
            {activeTab === 'input' && (
              <div className="flex flex-col animate-[fadeIn_0.3s_ease-in-out]">
                
                <div className="grid grid-cols-3 gap-1.5 w-full bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                  <div className="text-center text-[10px] font-bold text-gray-400 mb-1">強い感情</div>
                  <div className="text-center text-[10px] font-bold text-gray-400 mb-1">基本の感情</div>
                  <div className="text-center text-[10px] font-bold text-gray-400 mb-1">弱い感情</div>

                  {EMOTION_CATEGORIES.map((category) => (
                    <React.Fragment key={category.levels[0].id}>
                      {category.levels.map((emo) => {
                        const isSelected = selectedEmotions.has(emo.id);
                        return (
                          <button
                            key={emo.id}
                            onClick={() => toggleEmotion(emo.id)}
                            className={`relative h-12 md:h-14 rounded-lg flex flex-col items-center justify-center transition-all duration-200
                              ${isSelected ? `${emo.base} border-[2.5px] border-gray-800 ${emo.text} shadow-md scale-[1.05] z-10 opacity-100` : `${emo.base} border border-transparent ${emo.text} opacity-60 hover:opacity-80 active:scale-95`}
                            `}
                          >
                            <i className={`${emo.icon} text-lg mb-0.5`}></i>
                            <span className="text-[11px] md:text-xs font-bold leading-none">{emo.name}</span>
                            {isSelected && (
                              <div className="absolute -top-1.5 -right-1.5 bg-white rounded-full p-0.5 shadow border border-gray-200 w-4 h-4 flex items-center justify-center">
                                <i className="fas fa-check text-green-600 text-[10px]"></i>
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mt-4 mb-6 flex flex-col gap-3">
                  <h3 className="text-sm font-bold text-gray-600 flex items-center">
                    <i className="fas fa-check-circle text-blue-500 mr-1.5"></i>
                    選択した感情 ({selectedEmotions.size}個)
                  </h3>
                  
                  <div className="flex flex-wrap gap-1.5 min-h-[30px]">
                    {selectedEmotions.size === 0 ? (
                      <p className="text-xs text-gray-400">まだ選択されていません</p>
                    ) : (
                      Array.from(selectedEmotions).map(id => {
                        const emo = ALL_EMOTIONS.find(e => e.id === id);
                        if(!emo) return null;
                        return (
                          <span key={id} className={`flex items-center px-2 py-1 text-[11px] rounded-full font-bold ${emo.base} ${emo.text}`}>
                            <i className={`${emo.icon} mr-1 text-[10px]`}></i>
                            {emo.name}
                          </span>
                        );
                      })
                    )}
                  </div>

                  <div className="flex items-start gap-2 bg-gray-50 p-2.5 rounded-lg border border-gray-100 mt-2">
                    <i className="fas fa-comment-alt text-gray-400 mt-1"></i>
                    <textarea
                      value={comment}
                      onChange={(e) => setComment(e.target.value)}
                      placeholder="今、どんなことがありましたか？（任意）"
                      className="flex-1 bg-transparent border-none focus:outline-none text-sm p-0 text-gray-700 placeholder-gray-400 resize-none h-16"
                    ></textarea>
                  </div>

                  <button
                    onClick={handleSave}
                    disabled={selectedEmotions.size === 0}
                    className={`w-full py-3.5 mt-2 rounded-lg font-bold text-base flex items-center justify-center transition-all shadow-sm
                      ${selectedEmotions.size > 0 ? 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed shadow-none'}
                    `}
                  >
                    <i className="fas fa-check mr-2"></i>
                    この感情を記録に残す
                  </button>
                </div>

              </div>
            )}

            {activeTab === 'history' && (
              <div className="flex flex-col min-h-[calc(100vh-120px)] animate-[fadeIn_0.3s_ease-in-out]">
                <div className="flex justify-between items-center mb-3 px-1">
                  <h2 className="text-base font-bold text-gray-700 flex items-center">
                    <i className="fas fa-list mr-2 text-gray-500"></i>
                    タイムライン
                  </h2>
                  <span className="text-xs bg-blue-100 text-blue-700 font-bold px-2.5 py-1 rounded-full">{logs.length}件</span>
                </div>
                
                <div className="flex-1">
                  {logs.length === 0 ? (
                    <div className="text-center py-16 bg-white rounded-xl shadow-sm border border-gray-200">
                      <div className="bg-gray-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i className="fas fa-list text-gray-300 text-3xl"></i>
                      </div>
                      <p className="text-base text-gray-500 font-medium">まだ記録がありません</p>
                    </div>
                  ) : (
                    <div className="space-y-2.5">
                      {logs.map(log => {
                        const isNew = log.timestamp > lastExportTime;
                        return (
                          <div key={log.id} className={`bg-white p-3 rounded-xl shadow-sm border flex flex-col gap-2 transition-all ${isNew ? 'border-red-200 shadow-red-100' : 'border-gray-200'}`}>
                            <div className="flex flex-col gap-1.5">
                               <div className="flex justify-between items-center">
                                 <span className="text-[11px] text-gray-400 font-medium flex items-center">
                                  {formatDate(log.timestamp)}
                                 </span>
                                 {isNew && <span className="text-[9px] bg-red-100 text-red-600 font-bold px-1.5 py-0.5 rounded">未保存(CSV)</span>}
                               </div>
                              <div className="flex flex-wrap gap-1">
                                {log.emotions.map(emoId => {
                                  const emo = ALL_EMOTIONS.find(e => e.id === emoId);
                                  if(!emo) return null;
                                  return (
                                    <span key={emoId} className={`flex items-center px-1.5 py-0.5 text-[10px] rounded font-bold ${emo.base} ${emo.text}`}>
                                      <i className={`${emo.icon} mr-1 text-[8px]`}></i>
                                      {emo.name}
                                    </span>
                                  );
                                })}
                              </div>
                            </div>
                            {log.comment && (
                              <div className="text-xs text-gray-700 bg-gray-50 p-2.5 rounded-lg leading-relaxed border border-gray-100 break-all">
                                {log.comment}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div className={`mt-10 mb-6 bg-white p-4 rounded-xl shadow-sm border ${hasUnsavedChanges ? 'border-red-300 bg-red-50' : 'border-gray-200'}`}>
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-sm font-bold text-gray-700 flex items-center">
                      <i className="fas fa-file-alt text-gray-500 mr-1.5"></i>
                      ファイル (CSV) 管理
                    </h3>
                    {hasUnsavedChanges ? (
                      <span className="text-[10px] font-bold text-red-600 flex items-center"><i className="fas fa-exclamation-circle mr-1"></i> バックアップ推奨</span>
                    ) : (
                      <span className="text-[10px] font-bold text-green-600 flex items-center"><i className="fas fa-check-circle mr-1"></i> 保存済み</span>
                    )}
                  </div>
                  
                  <div className="grid grid-cols-2 gap-2 mb-4">
                    <button onClick={exportCSV} className={`flex items-center justify-center py-3 rounded-lg text-xs font-bold transition-colors active:scale-95 shadow-sm ${hasUnsavedChanges ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-gray-800 text-white hover:bg-gray-700'}`}>
                      <i className="fas fa-download mr-1.5"></i>CSVに書き出す
                    </button>
                    
                    <button onClick={handleImportClick} className="flex items-center justify-center py-3 bg-white border border-gray-300 text-gray-700 rounded-lg text-xs font-bold transition-colors active:scale-95 hover:bg-gray-50 shadow-sm">
                      <i className="fas fa-upload mr-1.5"></i>読み込んで復元
                    </button>
                    <input type="file" ref={fileInputRef} onChange={processImportFile} accept=".csv" style={{ display: 'none' }} />
                  </div>

                  <div className="pt-3 border-t border-gray-200 mt-2">
                     <button onClick={handleClearData} className="w-full flex items-center justify-center py-2 text-red-400 hover:text-red-600 rounded text-xs font-bold transition-colors">
                      <i className="fas fa-trash-alt mr-1"></i>アプリ内のデータをすべて削除
                    </button>
                  </div>
                </div>

              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around pb-[env(safe-area-inset-bottom)] pt-1.5 z-30">
            <button onClick={() => {setActiveTab('input'); window.scrollTo(0,0);}} className={`flex-1 flex flex-col items-center py-1 transition-colors ${activeTab === 'input' ? 'text-blue-600' : 'text-gray-400'}`}>
              <i className="fas fa-home text-xl mb-0.5"></i>
              <span className="text-[10px] font-bold">記録</span>
            </button>
            <button onClick={() => {setActiveTab('history'); window.scrollTo(0,0);}} className={`relative flex-1 flex flex-col items-center py-1 transition-colors ${activeTab === 'history' ? 'text-blue-600' : 'text-gray-400'}`}>
              {hasUnsavedChanges && <div className="absolute top-1 right-[calc(50%-14px)] w-2 h-2 bg-red-500 rounded-full border border-white"></div>}
              <i className="fas fa-list text-xl mb-0.5"></i>
              <span className="text-[10px] font-bold">履歴</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
